<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Scheduler</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 10px;
            width: 350px;
        }
        h2 {
            text-align: center;
        }
        #eventDetails {
            margin-top: 10px;
            padding: 10px;
            border: 1px solid #ccc;
            background: #f9f9f9;
            min-height: 50px;
        }
        button {
            display: block;
            width: 100%;
            padding: 8px;
            margin-top: 10px;
            background: #28a745;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background: #218838;
        }
    </style>
</head>
<body>
    <h2>Event Details</h2>
    <div id="eventDetails">Loading...</div>
    <button id="addToCalendar">Add to Google Calendar</button>

    <script src="popup.js"></script>
</body>
</html>
